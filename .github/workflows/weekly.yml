name: Weekly Flow Event Recon

# Kdy se to spouští
on:
  # Každé pondělí v 06:00 UTC (= 08:00 v létě / 07:00 v zimě v ČR a DK)
  schedule:
    - cron: '0 6 * * 1'
  # Spouštět ručně tlačítkem v GitHub UI (záložka Actions → Run workflow)
  workflow_dispatch:
  # Spustit i při každém pushi do main (užitečné pro ladění)
  push:
    branches: [main]

# Oprávnění, která workflow potřebuje
permissions:
  contents: write    # commitovat aktualizovaný CSV a HTML
  pages: write       # publikovat na GitHub Pages
  id-token: write    # auth pro Pages deployment

# Zabrání současnému běhu více instancí
concurrency:
  group: flow-event-recon
  cancel-in-progress: false

jobs:
  # ────────────────────────────────────────────────────────────
  # JOB 1: Stáhnout eventy a commitnout výstupy
  # ────────────────────────────────────────────────────────────
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Commit updated events.csv and index.html
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "Flow Event Recon Bot"
          git add events.csv index.html past_events.csv seen_urls.txt 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: weekly event refresh $(date +'%Y-%m-%d')"
            git push
          fi

  # ────────────────────────────────────────────────────────────
  # JOB 2: Publikovat index.html na GitHub Pages
  # ────────────────────────────────────────────────────────────
  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout (after scrape commit)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Prepare site folder
        run: |
          mkdir -p _site
          cp index.html _site/
          cp events.csv _site/
          cp past_events.csv _site/ 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
