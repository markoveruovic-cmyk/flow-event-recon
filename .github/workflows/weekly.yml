name: Weekly Flow Event Recon

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: flow-event-recon
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Commit updated events.csv and index.html
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "Flow Event Recon Bot"
          git add events.csv index.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: weekly event refresh $(date +'%Y-%m-%d')"
            git push
          fi

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout (after scrape commit)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Prepare site folder
        run: |
          mkdir -p _site
          cp index.html _site/
          cp events.csv _site/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
